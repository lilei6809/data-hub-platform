spring:
  application:
    name: iam-provisioning-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${IAM_PROVISIONING_DB_URL:jdbc:postgresql://localhost:5432/datahub}
    username: ${IAM_PROVISIONING_DB_USERNAME:datahub}
    password: ${IAM_PROVISIONING_DB_PASSWORD:datahub}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${IAM_PROVISIONING_SERVICE_PORT:8083}
