spring:
  application:
    name: iam-provisioning-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: "${IAM_PROVISIONING_DB_URL:jdbc:postgresql://localhost:5432/iam_provisioning}"
    username: "${IAM_PROVISIONING_DB_USERNAME:iam_provisioning}"
    password: "${IAM_PROVISIONING_DB_PASSWORD:iam_provisioning}"
  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    consumer:
      bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
      group-id: iam-provisioning-service
      auto-offset-reset: earliest
      enable-auto-commit: false        # 禁止自动提交，使用手动 Ack
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer: # DLT 路由需要 Producer
      bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} %kvp - %msg%n"

server:
  port: ${IAM_PROVISIONING_SERVICE_PORT:8083}


# keycloak client 的配置
cdp:
  kafka:
    consumer:
      enabled: "${KAFKA_CONSUMER_ENABLED:true}"
    topic:
      tenant-infrastructure-provisioned: "cdp.tenant.lifecycle.infrastructure-provisioned"
      tenant-infrastructure-provisioned-dlt: "cdp.tenant.lifecycle.infrastructure-provisioned.DLT"
  keycloak:
    admin:
      server-url: "${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:18080}"
      realm: "${KEYCLOAK_ADMIN_REALM:cdp-auth-pool}"
      admin-client-id: "${KEYCLOAK_ADMIN_CLIENT_ID:cdp-provisioning-service}"
      client-credential: "${KEYCLOAK_ADMIN_CLIENT_CREDENTIAL:tNXJWqasSLhIYaLG0FtECqNH4QhVXntb}"
      connect-timeout: 2s
      read-timeout: 1s
      enabled: "${KEYCLOAK_ADMIN_ENABLED:true}"
    adapter:
      real:
        enabled: "${KEYCLOAK_ADAPTER_REAL_ENABLED:true}"

  vault:
    adapter:
      real:
        enabled: "${VAULT_ADAPTER_REAL_ENABLED:false}"

