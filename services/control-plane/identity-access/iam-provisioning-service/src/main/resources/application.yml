spring:
  application:
    name: iam-provisioning-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: "${IAM_PROVISIONING_DB_URL:jdbc:postgresql://localhost:5432/iam_provisioning}"
    username: "${IAM_PROVISIONING_DB_USERNAME:iam_provisioning}"
    password: "${IAM_PROVISIONING_DB_PASSWORD:iam_provisioning}"
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000           # 空闲连接 5 分钟后回收
      max-lifetime: 1800000          # 连接最长存活 30 分钟后强制回收
      leak-detection-threshold: 30000 # 连接被借出超过 30 秒未归还，打警告日志

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    producer: # DLT 路由需要 Producer
      bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
      # 序列化：生产环境推荐 JSON 或 Avro + Schema Registry
      # JSON 适合 MVP 阶段，Avro 适合需要强 Schema 演化的大规模系统
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        # 可靠性地基
        ack: all
        enable.idempotence: true

        # 重试配置
        # retries 设置极大值， 让 delivery.timeout.ms 来控制最终超时时长
        retries: 2147483647
        retry.backoff.ms: 100

        # 超时配置（这是真正控制"放弃"的关键）
        delivery.timeout.ms: 60000   # 1分钟：从 send() 到成功确认的总时间上限
        request.timeout.ms: 15000     # 单次 Broker 响应等待时间
        # 批处理：提升吞吐（对 IAM onboarding 场景影响不大，但是好习惯）
        linger.ms: 5          # 等待 5ms 攒批，平衡延迟与吞吐
        batch.size: 16384     # 16KB，默认值即可

        # 压缩：生产环境必须开启，lz4 是性价比最高的选择
        compression.type: lz4

        # 缓冲区：Producer 内存中的消息缓冲
        buffer.memory: 33554432  # 32MB

        # 避免敏感信息进日志
        # 在 Spring Kafka 层额外配置
    consumer:
      bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
      group-id: iam-provisioning-service
      auto-offset-reset: earliest
      enable-auto-commit: false        # 禁止自动提交，使用手动 Ack
        # 反序列化
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      properties:
#        # 告诉 JsonDeserializer 信任哪些包下的类（安全配置）
#        spring.json.trusted.packages: "io.datahub.platform.iamprovisioning.interfaces.messaging.dto"

        # 每次 poll 拿多少条消息
        # IAM onboarding 是重操作（要调 Keycloak），建议设小
        max.poll.records: 10   # 不要用默认的 500！

        # Consumer 两次 poll 之间的最大时间间隔
        # = max.poll.records × 单条消息最大处理时间 × 安全系数
        # 10条 × 10秒/条 × 2 = 200秒，再加缓冲
        # 对于 IAM Provisioning 场景：Keycloak 调用可能需要 1-5 秒，加上网络超时重试，单条最坏情况可能达到 10 秒
        max.poll.interval.ms: 200000

        # Heartbeat 间隔（必须 < session.timeout.ms / 3）
        heartbeat.interval.ms: 3000

        # Broker 等待心跳的最大时间
        session.timeout.ms: 9000

        isolation.level: read_committed  # 与幂等 Producer 配套

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} %kvp - %msg%n"

server:
  port: ${IAM_PROVISIONING_SERVICE_PORT:8083}


# keycloak client 的配置
cdp:
  postgre:
    enabled: true
  kafka:
    producer:
      enabled:  "${KAFKA_PRODUCER_ENABLED:true}"
    consumer:
      enabled: "${KAFKA_CONSUMER_ENABLED:true}"
      concurrency: "${KAFKA_CONSUMER_CONCURRENCY:1}"
    topics:
#      inbound:
        tenant-infrastructure-provisioned: "cdp.infrastructure.tenant.provisioned"
        tenant-infrastructure-provisioned-dlt: "cdp.infrastructure.tenant.provisioned.dlt"
#      outbound:
        tenant-iam-provisioned: "cdp.iam.tenant.provisioned"
        tenant-iam-provision-failed: "cdp.iam.tenant.provision-failed"
  keycloak:
    admin:
      server-url: "${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:18080}"
      realm: "${KEYCLOAK_ADMIN_REALM:cdp-auth-pool}"
      admin-client-id: "${KEYCLOAK_ADMIN_CLIENT_ID:cdp-provisioning-service}"
      client-credential: "${KEYCLOAK_ADMIN_CLIENT_CREDENTIAL:tNXJWqasSLhIYaLG0FtECqNH4QhVXntb}"
      connect-timeout: 2s
      read-timeout: 1s
      enabled: "${KEYCLOAK_ADMIN_ENABLED:true}"
    adapter:
      real:
        enabled: "${KEYCLOAK_ADAPTER_REAL_ENABLED:true}"

  vault:
    adapter:
      real:
        enabled: "${VAULT_ADAPTER_REAL_ENABLED:false}"
