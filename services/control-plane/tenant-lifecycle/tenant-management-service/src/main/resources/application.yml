spring:
  application:
    name: tenant-management-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${TENANT_MANAGEMENT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tenant_management}
    username: ${TENANT_MANAGEMENT_DATASOURCE_USERNAME:user}
    password: ${TENANT_MANAGEMENT_DATASOURCE_PASSWORD:password}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
