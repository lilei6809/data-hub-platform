# Local development infrastructure only.
# This file is intentionally minimal and does not represent production deployment topology.

name: data-hub-local

services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: data-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: postgres
      TENANT_MANAGEMENT_DB: ${TENANT_MANAGEMENT_DB}
      TENANT_MANAGEMENT_DB_USERNAME: ${TENANT_MANAGEMENT_DB_USERNAME}
      TENANT_MANAGEMENT_DB_PASSWORD: ${TENANT_MANAGEMENT_DB_PASSWORD}
      POSTGRES_TENANT_MANAGEMENT_DB: ${TENANT_MANAGEMENT_DB}
      APP_DB_USER: ${TENANT_MANAGEMENT_DB_USERNAME}
      APP_DB_PASSWORD: ${TENANT_MANAGEMENT_DB_PASSWORD}
      KEYCLOAK_DB: ${KEYCLOAK_DB}
      KEYCLOAK_DB_USERNAME: ${KEYCLOAK_DB_USERNAME}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_KEYCLOAK_DB: ${KEYCLOAK_DB}
      IAM_PROVISIONING_DB: ${IAM_PROVISIONING_DB}
      IAM_PROVISIONING_DB_USERNAME: ${IAM_PROVISIONING_DB_USERNAME}
      IAM_PROVISIONING_DB_PASSWORD: ${IAM_PROVISIONING_DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - data-hub

  redis:
    image: redis:${REDIS_IMAGE_TAG}
    container_name: data-hub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data-hub

  kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG}
    container_name: data-hub-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - data-hub



  kafka-ui:
    image: kafbat/kafka-ui:${KAFKA_UI_IMAGE_TAG}
    container_name: data-hub-kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_IMAGE_TAG}
    container_name: data-hub-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    volumes:
      - ../local/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - data-hub

  vault:
    image: hashicorp/vault:${VAULT_IMAGE_TAG}
    container_name: data-hub-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command:
      [
        "server",
        "-dev",
        "-dev-root-token-id=${VAULT_DEV_ROOT_TOKEN}",
        "-dev-listen-address=0.0.0.0:8200",
      ]
    environment:
      VAULT_API_ADDR: http://127.0.0.1:8200
    ports:
      - "${VAULT_HTTP_PORT}:8200"
    volumes:
      - ../local/vault:/workspace/local/vault
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - data-hub

networks:
  data-hub:
    name: data-hub-local

volumes:
  postgres-data:
  redis-data:
  kafka-data:
